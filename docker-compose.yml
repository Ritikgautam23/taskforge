version: '3.8'

services:
  # MongoDB database
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: taskforge
    volumes:
      - mongodb_data:/data/db
    networks:
      - taskforge-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/taskforge
      JWT_SECRET: dev-secret-key-change-in-production
      FRONTEND_URL: http://localhost:5173
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - taskforge-network
    command: npm run dev

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "5173:3000"
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_USE_MOCK: false
    depends_on:
      - backend
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/dist
    networks:
      - taskforge-network
    # For development, use Vite dev server instead:
    # command: npm run dev

volumes:
  mongodb_data:

networks:
  taskforge-network:
    driver: bridge
