# TaskForge - Railway Deployment Configuration
# This file configures both backend and frontend services for Railway's monorepo support

[services.backend]
  # Service: Backend API
  # Location: /backend
  startCommand = "node src/server.js"
  healthcheckPath = "/api/health"
  
  [services.backend.environment]
    NODE_ENV = "production"
    JWT_SECRET = "5eb17bf3"  # REPLACE WITH FULL SECRET
    FRONTEND_URL = "https://taskforge-frontend.up.railway.app"
    # MONGODB_URI auto-injected by MongoDB plugin

[services.frontend]
  # Service: Frontend (Vite static build)
  # Location: / (project root)
  buildCommand = "npm ci && npm run build"
  startCommand = "npx serve dist -p $PORT"
  publishDirectory = "dist"
  healthcheckPath = "/"
  
  [services.frontend.environment]
    VITE_API_URL = "https://taskforge-backend.up.railway.app/api"
    VITE_USE_MOCK = "false"
