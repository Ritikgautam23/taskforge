# Railway monorepo configuration
# Defines both backend and frontend services

[services.backend]
  # Backend service configuration
  [services.backend.build]
    builder = "nixpacks"
    buildCommand = "npm ci --only=production"
  
  [services.backend.deploy]
    startCommand = "node src/server.js"
    healthcheckPath = "/api/health"
    healthcheckTimeout = 100
  
  [services.backend.environment]
    NODE_ENV = "production"
    JWT_SECRET = "5eb17bf3"  # REPLACE WITH YOUR GENERATED SECRET
    FRONTEND_URL = "https://taskforge-frontend.up.railway.app"
    # MONGODB_URI comes from MongoDB plugin automatically

[services.frontend]
  # Frontend service configuration
  [services.frontend.build]
    builder = "nixpacks"
    buildCommand = "npm ci && npm run build"
  
  [services.frontend.deploy]
    startCommand = "npx serve dist -p $PORT"
    publishDirectory = "dist"
    healthcheckPath = "/"
    healthcheckTimeout = 100
  
  [services.frontend.environment]
    VITE_API_URL = "https://taskforge-backend.up.railway.app/api"
    VITE_USE_MOCK = "false"
