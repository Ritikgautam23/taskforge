# Railway Configuration for TaskForge
# This file tells Railway how to deploy the monorepo

[build]
# Backend service builder
[build.context="backend"]
builder = "nixpacks"
buildCommand = "npm ci --only=production"

# Frontend service builder
[build.context="."]
builder = "nixpacks"
buildCommand = "npm ci && npm run build"

[deploy]
# Backend deployment
[deploy.path="backend"]
startCommand = "node src/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 100

# Frontend deployment
[deploy.path="."]
startCommand = "npx serve dist -p $PORT"
healthcheckPath = "/"
healthcheckTimeout = 100

[env]
# Backend environment variables (configure in Railway dashboard)
# MONGODB_URI - Railway MongoDB addon will provide this automatically
# JWT_SECRET - Generate a secure random string
# NODE_ENV=production
# PORT=3000 (Railway sets this automatically)

# Frontend environment variables (configure in Railway dashboard)
# VITE_API_URL - Your backend URL (e.g., https://taskforge-backend.up.railway.app)
# VITE_USE_MOCK=false
