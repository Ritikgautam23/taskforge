# Railway monorepo deployment configuration
# Both services deployed from a single GitHub repository

[services.backend]
  # Backend: Node.js Express API
  # Location: backend/ directory
  startCommand = "npm --prefix backend start"
  healthcheckPath = "/api/health"
  
  [services.backend.environment]
    NODE_ENV = "production"
    JWT_SECRET = "5eb17bf3"  # CHANGE THIS to your generated secret
    FRONTEND_URL = "https://taskforge-frontend.up.railway.app"
    # MONGODB_URI is auto-injected by Railway MongoDB plugin

[services.frontend]
  # Frontend: Static site (built with Vite)
  # Location: project root
  buildCommand = "npm run build"
  publishDirectory = "dist"
  healthcheckPath = "/"
  
  [services.frontend.environment]
    VITE_API_URL = "https://taskforge-backend.up.railway.app/api"
    VITE_USE_MOCK = "false"
